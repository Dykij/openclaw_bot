global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "openclaw_telemetry"
    static_configs:
      - targets: [ "prometheus_telemetry:9090" ]
    metrics_path: /metrics

  - job_name: "questdb"
    static_configs:
      - targets: [ "questdb_timeseries:9000" ]
    metrics_path: /metrics
